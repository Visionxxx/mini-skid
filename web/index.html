<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Skid</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            background: #0a0a0a;
        }
        canvas {
            display: block;
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
        }
        #loading {
            position: fixed; inset: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background: #0a0a0a; color: #ccc;
            font-family: 'Courier New', monospace;
            z-index: 10;
            transition: opacity 0.5s;
        }
        #loading h1 {
            font-size: 2rem; color: #e33;
            margin-bottom: 0.5rem;
            letter-spacing: 0.1em;
        }
        #loading .sub { font-size: 0.9rem; color: #666; margin-bottom: 2rem; }
        #loading .spinner {
            width: 36px; height: 36px;
            border: 3px solid #222; border-top: 3px solid #e33;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="loading">
        <h1>MINI SKID</h1>
        <div class="sub">Loading...</div>
        <div class="spinner"></div>
    </div>

    <canvas id="glcanvas" tabindex="1"></canvas>

    <script>
    // Vis kun fatale feil under WASM-lasting (ikke GL-advarsler under gameplay)
    var _gameStarted = false;
    var _origErr = console.error;
    console.error = function() {
        if (!_gameStarted) {
            var msg = Array.prototype.slice.call(arguments).map(function(a) {
                return a instanceof Error ? a.message + '\n' + a.stack : String(a);
            }).join(' ');
            // Ignorer GL-advarsler (ikke fatale)
            if (msg.indexOf('called with') === -1) {
                var el = document.getElementById('loading');
                if (el) el.innerHTML = '<h1 style="color:#e33">Error</h1><pre style="color:#ccc;max-width:90%;overflow:auto;text-align:left;font-size:0.8rem;padding:1rem">' + msg + '</pre>';
            }
        }
        _origErr.apply(console, arguments);
    };
    window.addEventListener('unhandledrejection', function(e) {
        if (!_gameStarted) console.error(e.reason || e);
    });
    </script>
    <script src="mq_js_bundle.js"></script>
    <script>
    load("mini_skid.wasm");
    // Skjul loading-overlegget naar WASM er initialisert
    (function waitForWasm() {
        if (typeof wasm_exports !== 'undefined' && wasm_exports !== null) {
            _gameStarted = true;
            var el = document.getElementById('loading');
            if (el) { el.style.opacity = '0'; setTimeout(function() { el.style.display = 'none'; }, 500); }
            canvas.focus();
        } else {
            setTimeout(waitForWasm, 100);
        }
    })();
    </script>
</body>
</html>
